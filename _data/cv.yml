- title: Research Experience
  type: time_table
  contents:
    - title: Research Intern — Video World Models
      institution: Peking University, Prof. Hao Tang's Lab (Remote)
      year: Oct 2025 - Present
      description:
        - "Building multi-view video world models with consistent cross-perspective synthesis, targeting NeurIPS 2026."
        - "Constructed the full training pipeline end-to-end: game data preprocessing (frame extraction, camera parameter conversion, action encoding, clip segmentation), model adaptation to the training framework, and distributed LoRA fine-tuning of a 14B-parameter DiT model."
        - "LoRA configuration: rank 32, 560 target modules (attention q/k/v/o + FFN + camera injector), 205M trainable parameters (1.1% of total), trained with DeepSpeed ZeRO-2 on 8×H20 GPUs."
        - "Resolved a series of engineering challenges including Plücker embedding format mismatches, VAE/T5 device management for non-standard modules, timestep tensor shape inconsistencies, and control_type/control_dim configuration issues."
        - "Code-level understanding of DiT architecture internals: patch embedding, self/cross-attention, AdaLN modulation, MoE dual-model structure, flow matching training (velocity prediction, sigma schedule with shift transform)."
        - "Read and compared multi-view generation approaches (MultiGen, PERSIST, ShareVerse), analyzed trade-offs across 2D memory, 3D voxel state, and cross-agent attention paradigms to inform the project's technical direction."
        - "Successfully reproduced multi-GPU inference (4-GPU FSDP + Ulysses sequence parallelism) for 81-frame 480×832 video generation."

